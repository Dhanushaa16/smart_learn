<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Course Lessons</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    body {
      background: #0F172A;
      color: #F8FAFC;
      font-family: "Segoe UI", sans-serif;
      padding: 30px;
    }

    a {
      color: #38BDF8;
      text-decoration: none;
      display: inline-block;
      margin-bottom: 20px;
    }

    h1 {
      margin-bottom: 20px;
    }

    .lesson {
      background: #1E293B;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .lesson button {
      background: linear-gradient(90deg,#38BDF8,#F472B6);
      border: none;
      padding: 8px 14px;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      color: #0F172A;
    }
  </style>
</head>

<body>

<a href="dashboard.html">← Back to Dashboard</a>

<h1 id="courseTitle">Loading...</h1>
<div id="lessonList"></div>

<div id="pdfContainer" style="margin-top:30px; display:none;">
  <h2>Lesson Content</h2>

  <iframe id="pdfViewer" width="100%" height="700"></iframe>
</div>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1480.0.min.js"></script>
<script src="js/aws-config.js"></script>
<script>

// 1️⃣ Read course from URL
const params = new URLSearchParams(window.location.search);
const courseId = params.get("course");

// 2️⃣ Get enrolled courses
const enrolledCourses = JSON.parse(localStorage.getItem("enrolledCourses")) || [];

// 3️⃣ Check enrollment
const enrolled = enrolledCourses.find(c => c.id === courseId);

// 4️⃣ Lesson data
const lessonsData = {
  web: [
    "Introduction to Web Development",
    "HTML Basics",
    "CSS Styling",
    "JavaScript Fundamentals",
    "Mini Web Project"
  ],
  python: [
    "Introduction to Python",
    "Variables & Data Types",
    "Conditional Statements",
    "Loops & Functions",
    "Python Mini Project"
  ],
  datascience: [
    "Data Science Overview",
    "Python for Data Science",
    "Pandas & NumPy",
    "Data Visualization",
    "Case Study"
  ],
  ml: [
    "Introduction to Machine Learning",
    "Supervised Learning",
    "Unsupervised Learning",
    "Model Evaluation",
    "ML Project"
  ],
  ai: [
    "Introduction to AI",
    "Search Algorithms",
    "Knowledge Representation",
    "Expert Systems",
    "AI Applications"
  ],
  cloud: [
    "Cloud Computing Basics",
    "Service Models",
    "Virtualization",
    "Cloud Security",
    "Deployment Models"
  ],
  cyber: [
    "Cyber Security Basics",
    "Types of Attacks",
    "Network Security",
    "Cryptography",
    "Ethical Hacking Basics"
  ],
  dbms: [
    "Database Concepts",
    "ER Diagrams",
    "SQL Basics",
    "Normalization",
    "Mini DB Project"
  ],
  java: [
    "Java Introduction",
    "OOP Concepts",
    "Exception Handling",
    "Collections Framework",
    "Java Project"
  ],
  dm: [
    "Digital Marketing Overview",
    "SEO Fundamentals",
    "Social Media Marketing",
    "Google Ads Basics",
    "Analytics & Reporting"
  ]
};

const title = document.getElementById("courseTitle");
const list = document.getElementById("lessonList");

// 5️⃣ Validation
if (!courseId || !lessonsData[courseId]) {
  title.textContent = "Course Not Found";
  list.innerHTML = "<p>No lessons available.</p>";
  throw new Error("Invalid course");
}

if (!enrolled) {
  title.textContent = "Access Denied";
  list.innerHTML = "<p>You are not enrolled in this course.</p>";
  throw new Error("Not enrolled");
}

// 6️⃣ Render lessons
title.textContent = enrolled.name + " – Lessons";

lessonsData[courseId].forEach((lesson, index) => {

  const lessonNumber = index + 1;

  // S3 PDF URL
  const pdfUrl = `https://smartlearnai.s3.us-east-1.amazonaws.com/lessons/${courseId}-L${lessonNumber}.pdf`;

  const div = document.createElement("div");
  div.className = "lesson";

  div.innerHTML = `
    <span>Lesson ${lessonNumber}: ${lesson}</span>

    <div>
      <button onclick="openLesson('${pdfUrl}')">View</button>

      <button id="btn-${courseId}-L${lessonNumber}" 
onclick="completeLesson('${courseId}','L${lessonNumber}')">
  Complete
</button>
    </div>
  `;

  list.appendChild(div);
});

// 7️⃣ Save lesson completion
function completeLesson(course, lessonId){

let progress = JSON.parse(localStorage.getItem("lessonProgress")) || {};

if (!progress[course]) progress[course] = [];

if (!progress[course].includes(lessonId)) {
  progress[course].push(lessonId);
}

localStorage.setItem("lessonProgress", JSON.stringify(progress));

// ✅ Change button to tick
const btn = document.getElementById(`btn-${course}-${lessonId}`);
if(btn){
  btn.innerHTML = "✔ Completed";
  btn.style.background = "#22C55E";
}

alert("Lesson completed ✅");

}
function loadCompletedStatus(){

let progress = JSON.parse(localStorage.getItem("lessonProgress")) || {};

if(progress[courseId]){
  progress[courseId].forEach(lessonId => {

    const btn = document.getElementById(`btn-${courseId}-${lessonId}`);
    if(btn){
      btn.innerHTML = "✔ Completed";
      btn.style.background = "#22C55E";
    }

  });
}

}
loadCompletedStatus();
function updateDashboard(){

let progress = JSON.parse(localStorage.getItem("lessonProgress")) || {};

let totalCompleted = 0;

for(let course in progress){
  totalCompleted += progress[course].length;
}

// Update UI
document.getElementById("lessonCount").textContent = totalCompleted;

}

updateDashboard();
// 8️⃣ Open lesson PDF
function openLesson(pdfUrl){
  window.open(pdfUrl, "_blank");
}


</script>

</body>
</html>
