    .replace(/</g, "&lt;")

}

// 🚀 Load quizzes for all enrolled courses

// 🚀 LOAD ALL QUIZZES
loadAllQuizzes();

function loadAllQuizzes(){

if(enrolledCourses.length === 0){
  container.innerHTML = "<p>No enrolled courses</p>";
  return;
}

let results = JSON.parse(localStorage.getItem("quizResults")) || {};

let html = "";

enrolledCourses.forEach(course => {

const courseId = course.id;
const courseName = course.name;
const quiz = quizzes[courseId];

if(!quiz) return;

// ✅ SHOW COMPLETED BADGE
if(results[courseId]?.completed){
  html += `
  <div style="background:#1E293B;padding:20px;border-radius:10px;margin-bottom:20px;">
    <h2>${courseName}</h2>
    <h3 style="color:#22C55E;">✔ Quiz Completed</h3>
    <p>Score: ${results[courseId].score}/5</p>
  </div>
  `;
  return;
}

html += `<h2>${courseName}</h2>`;

quiz.forEach((q,index)=>{

html += `<div class="question">
<p><b>${index+1}. ${q.q}</b></p>`;

q.options.forEach((opt,i)=>{

html += `
<label style="display:block; margin:10px 0;">
<input type="radio" name="${courseId}-q${index}" value="${i}">
  <span style="margin-left:8px;">${escapeHTML(opt)}</span>
</label>
`;

});

html += `</div>`;

});

// submit button
html += `<button onclick="submitQuiz('${courseId}')">Submit ${courseName} Quiz</button><hr>`;

});

document.getElementById("quizContainer").innerHTML = html;

}
loadAllQuizzes();

// 🚀 SUBMIT QUIZ

function submitQuiz(courseId){

const quiz = quizzes[courseId];
let score = 0;
let userAnswers = [];
let allAnswered = true; // 🔥 NEW

quiz.forEach((q,index)=>{

const selected = document.querySelector(`input[name="${courseId}-q${index}"]:checked`);

if(selected){
  userAnswers.push(parseInt(selected.value));

  if(parseInt(selected.value) === q.answer){
    score++;
  }
}else{
  allAnswered = false; // ❌ NOT ANSWERED
}

});

// 🔥 VALIDATION CHECK
if(!allAnswered){
  alert("⚠️ Please answer all questions before submitting!");
  return; // 🚫 STOP SUBMIT
}

// SAVE RESULT
let results = JSON.parse(localStorage.getItem("quizResults")) || {};

results[courseId] = {
  score: score,
  completed: true,
  answers: userAnswers
};

localStorage.setItem("quizResults", JSON.stringify(results));

alert(`${courseId.toUpperCase()} Score: ${score}/5`);

// Reload page
location.reload();

}
function saveQuizResult(courseId, score, answers){

  let results = JSON.parse(localStorage.getItem("quizResults")) || {};

  results[courseId] = {
    score: score,
    answers: answers
  };

  localStorage.setItem("quizResults", JSON.stringify(results));

  console.log("Quiz saved locally ✅");
}

</script>
