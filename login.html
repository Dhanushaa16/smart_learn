<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | SmartLearnAI</title>

  <style>
    /* ===== Base ===== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background-color: #0F172A;
      color: #F8FAFC;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ===== Auth Container ===== */
    .auth-container {
      width: 100%;
      max-width: 380px;
      padding: 20px;
    }

    .auth-card {
      background: #1E293B;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
      text-align: center;
    }

    .auth-card h2 {
      margin-bottom: 8px;
      font-size: 24px;
    }

    .auth-card p {
      margin-bottom: 20px;
      color: #94A3B8;
      font-size: 14px;
    }

    /* ===== Inputs ===== */
    .auth-card input {
      width: 100%;
      padding: 12px 14px;
      margin-bottom: 14px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #0F172A;
      color: #F8FAFC;
      font-size: 14px;
    }

    .auth-card input::placeholder {
      color: #64748B;
    }

    .auth-card input:focus {
      outline: none;
      border-color: #38BDF8;
    }

    /* ===== Button ===== */
    .primary-btn {
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-size: 15px;
      font-weight: 600;
      color: #0F172A;
      background: linear-gradient(90deg, #38BDF8, #F472B6);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .primary-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 25px rgba(56,189,248,0.4);
    }

    /* ===== Link ===== */
    .auth-link {
      margin-top: 16px;
      font-size: 13px;
      color: #94A3B8;
    }

    .auth-link a {
      color: #38BDF8;
      text-decoration: none;
    }

    .auth-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>

<body>

  <div class="auth-container">
    <div class="auth-card">
      <h2>Welcome Back 👋</h2>
      <p>Login to continue learning</p>

      <input type="email" id="email" placeholder="Email Address" required>
<input type="password" id="password" placeholder="Password" required>

<button type="button" onclick="loginUser()">Login</button>

      <p class="auth-link">
        Don’t have an account? <a href="register.html">Register</a>
      </p>
    </div>
  </div>
  
<script>
function loginUser() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  let users = JSON.parse(localStorage.getItem("users")) || {};

  if (!users[email]) {
    alert("User not found. Please register.");
    return;
  }

  // ✅ Save logged in user
  localStorage.setItem("currentUser", email);

  alert("Login successful!");

  // 👉 redirect to dashboard / course page
  window.location.href = "index.html";
}
</script>
<script src="https://unpkg.com/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
<script src="js/cognito-config.js"></script>
<script src="js/auth.js"></script>

  

</body>
</html>
