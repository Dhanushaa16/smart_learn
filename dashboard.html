<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Dashboard | SmartLearnAI</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", system-ui, sans-serif;
    }

    body {
      background: #0F172A;
      color: #F8FAFC;
      min-height: 100vh;
    }

    /* ===== NAVBAR ===== */
    header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 22px 40px;
      border-bottom: 1px solid #1E293B;
    }

    header h1 {
      font-size: 22px;
      font-weight: 700;
    }

    nav a {
      margin-left: 22px;
      text-decoration: none;
      color: #CBD5F5;
      font-size: 14px;
    }

    nav a:hover {
      color: #38BDF8;
    }

    /* ===== MAIN ===== */
    .container {
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 30px;
    }

    .welcome {
      margin-bottom: 35px;
    }

    .welcome h2 {
      font-size: 26px;
      margin-bottom: 6px;
    }

    .welcome p {
      color: #94A3B8;
      font-size: 14px;
    }

    /* ===== STATS ===== */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-bottom: 40px;
    }

    .stat-card {
      background: #1E293B;
      padding: 22px;
      border-radius: 14px;
      text-align: center;
    }

    .stat-card h3 {
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 8px;
    }

    .stat-card span {
      font-size: 26px;
      font-weight: 700;
    }

    /* ===== SECTION TITLE ===== */
    .section-title {
      font-size: 18px;
      margin-bottom: 16px;
    }

    /* ===== COURSE PROGRESS ===== */
    .progress-box {
      background: #1E293B;
      padding: 24px;
      border-radius: 16px;
      margin-bottom: 40px;
    }

    .course {
      margin-bottom: 18px;
    }

    .course label {
      display: flex;
      justify-content: space-between;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .bar {
      height: 8px;
      background: #0F172A;
      border-radius: 6px;
      overflow: hidden;
    }

    .fill {
      height: 100%;
      border-radius: 6px;
    }

    .web { width: 78%; background: linear-gradient(90deg,#38BDF8,#F472B6); }
    .python { width: 62%; background: linear-gradient(90deg,#38BDF8,#A78BFA); }
    .ml { width: 45%; background: linear-gradient(90deg,#F472B6,#A78BFA); }

    /* ===== MY COURSES ===== */
    .courses-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .course-card {
      background: #1E293B;
      padding: 20px;
      border-radius: 16px;
    }

    .course-card h4 {
      margin-bottom: 6px;
      font-size: 16px;
    }

    .course-card p {
      font-size: 13px;
      color: #94A3B8;
      margin-bottom: 14px;
    }

    .course-card button {
      background: linear-gradient(90deg,#38BDF8,#F472B6);
      border: none;
      padding: 8px 14px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      color: #0F172A;
      font-size: 13px;
    }

    .course-card button:hover {
      opacity: 0.9;
    }
  </style>
</head>

<body>

<!-- ===== NAVBAR ===== -->
<header>
  <h1>SmartLearnAI</h1>
  <nav>
    <a href="quiz.html">Quizzes</a>
    <a href="chatbot.html">AI Chatbot</a>
    <a href="index.html">Logout</a>
    <a href="view-score.html">
  <button>View Score</button>
</a>
  </nav>
</header>

<!-- ===== CONTENT ===== -->
<div class="container">

  <!-- Welcome -->
  <div class="welcome">
    <h2>Welcome back, Student 👋</h2>
    <p>Your learning progress at a glance</p>
  </div>

  <!-- Stats -->
  

  
<div class="stat-card">
  <h3>Lessons Completed</h3>
  <span id="lessonCount">0</span>
</div>

<div class="stat-card">
  <h3>Quizzes Completed</h3>
  <span id="quizCount">0</span>
</div>

<div class="stat-card">
  <h3>Average Score</h3>
  <span id="avgScore">0%</span>
</div>


  <h3 class="section-title">My Enrolled Courses</h3>
<div class="courses-grid" id="myCourses"></div>

</div>


<h3 class="section-title">Course Progress</h3>
<div id="progressContainer"></div>
<body>
<script>
  console.log("Dashboard script loaded");

  const courses = JSON.parse(localStorage.getItem("enrolledCourses")) || [];
  const container = document.getElementById("myCourses");

  // HARD RESET VIEW
  container.innerHTML = "";

  if (courses.length === 0) {
    container.innerHTML =
      "<p style='color:#94A3B8'>No courses enrolled yet</p>";
  }

  courses.forEach(course => {
    console.log("Rendering course:", course);

    const div = document.createElement("div");
    div.className = "course-card";

    div.innerHTML = `
      <h4>${course.name}</h4>
      <p>${course.desc}</p>
      <button onclick="openCourse('${course.id}')">
        Continue Learning
      </button>
    `;

    container.appendChild(div);
  });

  function openCourse(courseId) {
    console.log("Redirecting to course:", courseId);
    window.location.href = `course.html?course=${courseId}`;
  }
  function updateDashboard(){

let progress = JSON.parse(localStorage.getItem("lessonProgress")) || {};

let totalCompleted = 0;

for(let course in progress){
  totalCompleted += progress[course].length;
}

// Update UI
document.getElementById("lessonCount").textContent = totalCompleted;

}

// Run when page loads
updateDashboard();
const lessonsCount = {
  web: 5,
  python: 5,
  datascience: 5,
  ml: 5,
  ai: 5,
  cloud: 5,
  cyber: 5,
  dbms: 5,
  java: 5,
  dm: 5
};
function loadCourseProgress(){

let progress = JSON.parse(localStorage.getItem("lessonProgress")) || {};
let enrolledCourses = JSON.parse(localStorage.getItem("enrolledCourses")) || [];

const container = document.getElementById("progressContainer");

container.innerHTML = "";

enrolledCourses.forEach(course => {

  const courseId = course.id;
  const courseName = course.name;

  const completed = progress[courseId] ? progress[courseId].length : 0;
  const total = lessonsCount[courseId] || 5;

  const percent = Math.round((completed / total) * 100);

  const div = document.createElement("div");
  div.style.marginBottom = "20px";

  div.innerHTML = `
    <h4>${courseName} (${completed} / ${total})</h4>

    <div style="background:#1E293B; border-radius:10px; overflow:hidden;">
      <div style="
        width:${percent}%;
        background:linear-gradient(90deg,#38BDF8,#F472B6);
        padding:8px;
        color:white;
        font-size:12px;
        text-align:center;
      ">
        ${percent}%
      </div>
    </div>
  `;

  container.appendChild(div);

});

}
loadCourseProgress();
function updateQuizStats(){

let results = JSON.parse(localStorage.getItem("quizResults"));

const quizCountEl = document.getElementById("quizCount");
const avgScoreEl = document.getElementById("avgScore");

// 🛑 stop error if elements missing
if(!quizCountEl || !avgScoreEl){
  console.warn("Quiz elements not found in HTML");
  return;
}

if(!results){
  quizCountEl.textContent = 0;
  avgScoreEl.textContent = "0%";
  return;
}

let totalCompleted = 0;
let totalScore = 0;

Object.keys(results).forEach(course => {

  const data = results[course];

  if(data && data.completed){
  totalCompleted++;
  totalScore += data.score;
}

});

quizCountEl.textContent = totalCompleted;

let avg = totalCompleted > 0 
  ? Math.round((totalScore / (totalCompleted * 5)) * 100)
  : 0;

avgScoreEl.textContent = avg + "%";

}

updateQuizStats();
</script>


</body>
</html>
