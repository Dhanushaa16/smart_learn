<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Enroll Courses | SmartLearnAI</title>

  <style>
    body {
      background:#0F172A;
      color:#F8FAFC;
      font-family:"Segoe UI", system-ui, sans-serif;
      padding:40px;
    }

    h1 {
      margin-bottom: 25px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .course {
      background:#1E293B;
      padding:20px;
      border-radius:16px;
      box-shadow:0 10px 30px rgba(0,0,0,0.3);
    }

    .course h3 {
      margin-bottom:6px;
    }

    .course p {
      color:#94A3B8;
      font-size:13px;
      margin-bottom:16px;
    }

    button {
      background:linear-gradient(90deg,#38BDF8,#F472B6);
      border:none;
      padding:8px 14px;
      border-radius:10px;
      cursor:pointer;
      font-weight:600;
      color:#0F172A;
    }

    button:hover {
      opacity:0.9;
    }

    .footer-btn {
      margin-top:30px;
    }
  </style>
</head>
<body>

<h2>Enroll Courses</h2>

<div id="courseList"></div>

<button id="goDashboardBtn">Go to Dashboard</button>
<script src="https://sdk.amazonaws.com/js/aws-sdk-2.1480.0.min.js"></script>

<script src="https://unpkg.com/amazon-cognito-identity-js@latest/dist/amazon-cognito-identity.min.js"></script>

<script src="https://unpkg.com/aws-amplify@5.3.10/dist/aws-amplify.min.js"></script>
<script src="js/enroll.js"></script>
<script src="js/courses.js"></script>
</body>
</html>
